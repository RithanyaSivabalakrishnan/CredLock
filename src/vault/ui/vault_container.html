<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="script-src 'self' 'wasm-unsafe-eval'; object-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;" />
  <title>SecureVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" />
  <link rel="stylesheet" href="vault_container.css" />
</head>
<body>
  <div id="sv-shell">

    <header id="sv-header">
      <div class="sv-logo">
        <span class="sv-logo-icon">⬡</span>
        <span class="sv-logo-text">SecureVault</span>
      </div>
      <div class="sv-header-actions">
        <span id="sv-backend-badge" class="sv-badge-pill">Web Crypto</span>
        <button id="sv-lock-btn" title="Lock vault" class="sv-icon-btn">🔒</button>
      </div>
    </header>

    <div id="sv-status-bar">
      <span id="sv-status-dot" class="dot-locked"></span>
      <span id="sv-status-text">Vault Locked</span>
    </div>

    <!-- Unlock view — Google only -->
    <section id="sv-view-unlock" class="sv-view active">
      <div class="sv-unlock-hero">
        <div class="sv-shield">⬡</div>
        <h2>SecureVault</h2>
        <p>Sign in with Google to access your encrypted payment vault.</p>
      </div>
      <button id="sv-google-unlock-btn" class="sv-btn sv-btn-primary">
        Sign in with Google
      </button>
    </section>

    <!-- Main dashboard — two-column for side panel, single for popup -->
    <section id="sv-view-main" class="sv-view">
      <div class="sv-main-grid">
        <div class="sv-col sv-col-cards">
          <div class="sv-section-label">Saved Cards</div>
          <ul id="sv-profile-list" class="sv-profile-list"></ul>
          <button id="sv-add-profile-btn" class="sv-btn sv-btn-ghost sv-btn-sm">+ Add Card</button>
        </div>
        <div class="sv-col sv-col-pad">
          <div class="sv-section-label">CVV / OTP</div>
          <div id="sv-virtual-pad-mount"></div>
          <div class="sv-divider"></div>
          <button id="sv-autofill-btn" class="sv-btn sv-btn-primary" disabled>
            🔐 Autofill &amp; Pay
          </button>
        </div>
      </div>
    </section>

    <!-- Add card form -->
    <section id="sv-view-add-card" class="sv-view">
      <div class="sv-back-row">
        <button id="sv-back-btn" class="sv-icon-btn">← Back</button>
        <span class="sv-section-label">New Card</span>
      </div>
      <div class="sv-add-grid">
        <div class="sv-form-group sv-span-2">
          <label>Cardholder Name</label>
          <input id="sv-field-name" class="sv-virtual-field" data-field="name"
               type="text" placeholder="John Smith" autocomplete="off" spellcheck="false" />
        </div>
        <div class="sv-form-group sv-span-2">
          <label>Card Number</label>
          <input id="sv-field-number" class="sv-virtual-field" data-field="number"
               type="text" placeholder="1234 5678 9012 3456" maxlength="19" autocomplete="off" spellcheck="false" />
        </div>
        <div class="sv-form-group">
          <label>Expiry</label>
          <input id="sv-field-expiry" class="sv-virtual-field" data-field="expiry"
               type="text" placeholder="MM/YY" maxlength="5" autocomplete="off" spellcheck="false" />
        </div>
        <div class="sv-form-group">
          <label>CVV</label>
          <input id="sv-field-cvv" class="sv-virtual-field sv-cvv-field" data-field="cvv"
               type="password" placeholder="•••" maxlength="4" autocomplete="off" spellcheck="false" readonly />
        </div>
        <div class="sv-span-2"><div id="sv-cvv-pad-mount"></div></div>
        <button id="sv-save-card-btn" class="sv-btn sv-btn-primary sv-span-2">
          Save Encrypted
        </button>
      </div>
    </section>

    <div id="sv-shadow-host" aria-hidden="true"></div>
    <canvas id="sv-noise-canvas" width="1" height="1" aria-hidden="true"></canvas>
  </div>
  <script type="module" src="popup_ui.js"></script>
</body>
</html>
